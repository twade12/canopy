# nginx site for CANOPY Vision — TLS termination + reverse proxy to 127.0.0.1:8088.
# Install: sudo cp deploy/nginx-canopy.conf /etc/nginx/sites-available/canopy
#          sudo ln -s /etc/nginx/sites-available/canopy /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# Get certs first (see docs/DEPLOY.md): sudo certbot --nginx -d canopy.example.com

upstream canopy_app {
    server 127.0.0.1:8088;
    keepalive 16;
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name canopy.example.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name canopy.example.com;

    ssl_certificate     /etc/letsencrypt/live/canopy.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/canopy.example.com/privkey.pem;

    # PDFs / images can be large
    client_max_body_size 64m;

    # Server-Sent Events (chat + assistant streaming): no buffering, long timeout
    location ~ /stream$ {
        proxy_pass http://canopy_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
    }

    location / {
        proxy_pass http://canopy_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # large-model calls can take a while
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}
