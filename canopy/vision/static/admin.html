<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=2"><title>CANOPY · Admin Console</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <span class="wordmark">CANOPY</span><span class="muted" style="font-size:12.5px">Admin Console</span>
    <div class="spacer"></div>
    <a class="adm-back" href="/">← Back to app</a>
  </header>
  <div class="adm">
    <nav class="adm-nav" id="admNav"></nav>
    <main class="adm-main" id="admMain"></main>
  </div>
  <div id="modalRoot"></div>
  <script>
    const el = id => document.getElementById(id);
    const esc = s => (s == null ? '' : String(s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const SVG = {
      plug: '<path d="M9 2v6M15 2v6M7 8h10v3a5 5 0 01-10 0z" /><path d="M12 16v6"/>',
      team: '<circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0112 0"/><circle cx="17" cy="9" r="2.4"/><path d="M15 20a5 5 0 018 0"/>',
      org: '<rect x="4" y="9" width="16" height="11" rx="1"/><path d="M9 20v-4h6v4M9 13h.01M15 13h.01M4 9l8-5 8 5"/>',
      key: '<circle cx="8" cy="12" r="4"/><path d="M12 12h9M17 12v4M21 12v3"/>',
      gear: '<circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.6 1.6 0 00.32 1.77l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.6 1.6 0 00-1.77-.32 1.6 1.6 0 00-.97 1.47V21a2 2 0 01-4 0v-.1A1.6 1.6 0 008.9 19.4a1.6 1.6 0 00-1.77.32l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.6 1.6 0 00.32-1.77 1.6 1.6 0 00-1.47-.97H3a2 2 0 010-4h.1A1.6 1.6 0 004.6 8.9a1.6 1.6 0 00-.32-1.77l-.06-.06a2 2 0 112.83-2.83l.06.06a1.6 1.6 0 001.77.32H9a1.6 1.6 0 00.97-1.47V3a2 2 0 014 0v.1a1.6 1.6 0 00.97 1.47 1.6 1.6 0 001.77-.32l.06-.06a2 2 0 112.83 2.83l-.06.06a1.6 1.6 0 00-.32 1.77V9a1.6 1.6 0 001.47.97H21a2 2 0 010 4h-.1a1.6 1.6 0 00-1.47.97z"/>',
    };
    const svg = n => `<svg class="icon" viewBox="0 0 24 24">${SVG[n] || ''}</svg>`;
    const api = {
      async get(p) { const r = await fetch(p); if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.status); return r.json(); },
      async send(p, m, b) { const r = await fetch(p, { method: m, headers: { 'Content-Type': 'application/json' }, body: b ? JSON.stringify(b) : undefined }); if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.status); return r.json(); },
    };
    const SECTIONS = [
      { key: 'integrations', label: 'Integrations', icon: 'plug' },
      { key: 'team', label: 'Team', icon: 'team' },
      { key: 'org', label: 'Organization', icon: 'org' },
      { key: 'keys', label: 'API Keys', icon: 'key' },
      { key: 'settings', label: 'Settings', icon: 'gear' },
    ];
    let cur = (location.hash || '').replace('#', '') || 'integrations';
    if (!SECTIONS.some(s => s.key === cur)) cur = 'integrations';
    let presets = [], integrations = [];

    function renderNav() {
      el('admNav').innerHTML = SECTIONS.map(s => `<a class="adm-link ${s.key === cur ? 'on' : ''}" onclick="go('${s.key}')">${svg(s.icon)} ${s.label}</a>`).join('');
    }
    function go(k) { cur = k; location.hash = k; renderNav(); render(); }

    function modal(html) { el('modalRoot').innerHTML = `<div class="modal-backdrop" id="mbd" onmousedown="if(event.target===this)closeModal()"><div class="modal" style="width:min(560px,94vw)">${html}</div></div>`; }
    function closeModal() { el('modalRoot').innerHTML = ''; }

    async function render() {
      Org.stop();  // halt the physics loop when leaving the Organization tab
      const m = el('admMain');
      if (cur === 'integrations') return renderIntegrations(m);
      if (cur === 'team') return renderTeam(m);
      if (cur === 'org') return renderOrg(m);
      const stub = {
        keys: ['Canopy API keys', 'Generate and revoke API keys for programmatic access to this Canopy instance.'],
        settings: ['Settings', 'Instance settings — model, data location, appearance, and deploy options.'],
      }[cur];
      m.innerHTML = `<div class="adm-head"><h1>${stub[0]}</h1></div><div class="adm-stub">${svg(SECTIONS.find(s => s.key === cur).icon)}<div><div class="stub-t">Coming soon</div><p>${stub[1]}</p></div></div>`;
    }

    async function renderIntegrations(m) {
      m.innerHTML = `<div class="adm-head"><h1>Integrations</h1><button class="primary" onclick="openForm()">+ Add integration</button></div>
        <p class="muted" style="max-width:680px">Connect Canopy's outputs (triage results, NPI records, BOMs, listings) to the tools you already use. Most are just a base URL + an auth method — add any service with the generic REST connector.</p>
        <div id="intList" class="adm-grid"></div>`;
      try { [presets, integrations] = await Promise.all([api.get('/api/integrations/presets'), api.get('/api/integrations')]); }
      catch (e) { el('intList').innerHTML = `<p class="warn">${esc(e.message)}</p>`; return; }
      el('intList').innerHTML = integrations.length ? integrations.map(card).join('') :
        '<div class="adm-empty">No integrations yet. Click <b>+ Add integration</b> to connect Slack, Google Drive, Monday.com, Digi-Key, Mouser, WordPress, or any REST API.</div>';
    }
    function card(it) {
      return `<div class="int-card ${it.enabled ? '' : 'off'}">
        <div class="int-top"><b>${esc(it.name || it.kind)}</b><span class="int-kind">${esc(it.kind)}</span></div>
        <div class="int-url">${esc(it.base_url || '—')}</div>
        <div class="int-meta">auth: ${esc(it.auth_type)}${it.has_secret ? ` · key ${esc(it.secret_hint)}` : ''} · <span class="${it.enabled ? 'on' : 'muted'}">${it.enabled ? 'enabled' : 'disabled'}</span></div>
        <div class="row" style="margin-top:10px"><button onclick="testInt(${it.id})">Test</button><button onclick="openForm(${it.id})">Edit</button><button class="ghost danger" onclick="delInt(${it.id})">Delete</button><span class="int-test" id="test-${it.id}"></span></div></div>`;
    }
    async function testInt(id) { const s = el('test-' + id); s.innerHTML = '<span class="spinner"></span>';
      try { const r = await api.send(`/api/integrations/${id}/test`, 'POST'); s.innerHTML = r.ok ? `<span class="ok">reached (HTTP ${r.status || 'ok'})</span>` : `<span class="bad">${esc(r.error || 'unreachable')}</span>`; }
      catch (e) { s.innerHTML = `<span class="bad">${esc(e.message)}</span>`; } }
    async function delInt(id) { if (!confirm('Delete this integration?')) return; await api.send(`/api/integrations/${id}`, 'DELETE'); render(); }

    function openForm(id) {
      const it = id ? integrations.find(x => x.id === id) : { auth_type: 'none', config: {}, enabled: true, kind: 'rest' };
      const presetChips = presets.map(p => `<span class="chip" onclick="applyPreset('${p.kind}')">${esc(p.label)}</span>`).join('');
      modal(`<div class="m-head">${svg('plug')} ${id ? 'Edit' : 'Add'} integration</div>
        <div class="m-body">
          ${id ? '' : `<div class="muted" style="font-size:12px;margin-bottom:6px">Start from a preset, or fill in a generic REST API:</div><div class="chips" id="presetChips">${presetChips}</div>`}
          <label class="field"><span>Name</span><input id="fName" value="${esc(it.name || '')}" placeholder="e.g. CBM Slack"></label>
          <label class="field"><span>Base URL</span><input id="fUrl" value="${esc(it.base_url || '')}" placeholder="https://api.example.com"></label>
          <div class="row"><label class="field" style="flex:1"><span>Auth</span><select id="fAuth" onchange="authFields()"><option value="none">None</option><option value="api_key">API key (header)</option><option value="bearer">Bearer token</option><option value="basic">Basic (user + password)</option></select></label>
            <label class="field" style="flex:1"><span>Kind</span><input id="fKind" value="${esc(it.kind || 'rest')}"></label></div>
          <div id="authFields"></div>
          <label class="field"><span>Secret / token / key ${id && it.has_secret ? '(leave blank to keep ' + esc(it.secret_hint) + ')' : ''}</span><input id="fSecret" type="password" placeholder="paste token / key / app-password"></label>
          <label class="toggle"><input type="checkbox" id="fEnabled" ${it.enabled !== false ? 'checked' : ''}> Enabled</label>
        </div>
        <div class="m-foot"><span class="m-status" id="fStatus"></span><button onclick="closeModal()">Cancel</button><button class="primary" onclick="saveInt(${id || 'null'})">Save</button></div>`);
      el('fAuth').value = it.auth_type || 'none';
      window._cfg = it.config || {};
      authFields();
    }
    function applyPreset(kind) {
      const p = presets.find(x => x.kind === kind); if (!p) return;
      if (!el('fName').value) el('fName').value = p.label;
      el('fUrl').value = p.base_url; el('fAuth').value = p.auth_type; el('fKind').value = p.kind;
      window._cfg = Object.assign({}, p.config || {}); authFields();
    }
    function authFields() {
      const at = el('fAuth').value, c = window._cfg || {}; let h = '';
      if (at === 'api_key') h = `<label class="field"><span>Header name</span><input id="cHeader" value="${esc(c.header_name || 'Authorization')}"></label>`;
      else if (at === 'basic') h = `<label class="field"><span>Username</span><input id="cUser" value="${esc(c.username || '')}"></label>`;
      el('authFields').innerHTML = h;
    }
    async function saveInt(id) {
      const at = el('fAuth').value, cfg = {};
      if (at === 'api_key' && el('cHeader')) cfg.header_name = el('cHeader').value;
      if (at === 'basic' && el('cUser')) cfg.username = el('cUser').value;
      const body = { name: el('fName').value, kind: el('fKind').value, base_url: el('fUrl').value, auth_type: at, config: cfg, enabled: el('fEnabled').checked };
      const sec = el('fSecret').value; if (sec) body.secret = sec;
      el('fStatus').textContent = 'Saving…';
      try { await api.send(id ? `/api/integrations/${id}` : '/api/integrations', id ? 'PUT' : 'POST', body); closeModal(); render(); }
      catch (e) { el('fStatus').textContent = e.message; }
    }

    // ---- Team & access ----
    let users = [], projects = [];
    async function renderTeam(m) {
      m.innerHTML = `<div class="adm-head"><h1>Team</h1><button class="primary" onclick="openUser()">+ Add user</button></div>
        <p class="muted" style="max-width:680px">One admin manages the team. Sub-users sign in with their own credentials and only see the projects they're assigned — each as <b>read-only</b> or <b>read/write</b>.</p>
        <div id="userList" class="adm-grid"></div>`;
      try { [users, projects] = await Promise.all([api.get('/api/users'), api.get('/api/vehicles')]); }
      catch (e) { el('userList').innerHTML = `<p class="warn">${esc(e.message)}</p>`; return; }
      el('userList').innerHTML = users.map(userCard).join('');
    }
    function userCard(u) {
      const admin = u.role === 'admin';
      return `<div class="int-card">
        <div class="int-top"><b>${esc(u.username)}</b><span class="int-kind ${admin ? 'role-admin' : ''}">${admin ? 'Admin' : 'Member'}</span></div>
        <div class="int-meta">${admin ? 'Full access to every project &amp; the admin console.' : `${u.projects} project(s) assigned`}</div>
        <div class="row" style="margin-top:10px">${admin ? '' : `<button onclick="manageAccess(${u.id})">Manage access</button>`}<button class="ghost danger" onclick="delUser(${u.id},'${esc(u.username)}')">Delete</button></div></div>`;
    }
    function openUser() {
      modal(`<div class="m-head">${svg('team')} Add user</div>
        <div class="m-body">
          <label class="field"><span>Username</span><input id="uName" autocomplete="off" placeholder="e.g. jdoe"></label>
          <label class="field"><span>Temporary password</span><input id="uPass" type="text" autocomplete="off" placeholder="they can use this to sign in"></label>
          <label class="field"><span>Role</span><select id="uRole"><option value="user">Member — only assigned projects</option><option value="admin">Admin — full access + console</option></select></label>
        </div>
        <div class="m-foot"><span class="m-status" id="uStatus"></span><button onclick="closeModal()">Cancel</button><button class="primary" onclick="saveUser()">Create user</button></div>`);
    }
    async function saveUser() {
      const body = { username: el('uName').value.trim(), password: el('uPass').value, role: el('uRole').value };
      if (!body.username || !body.password) { el('uStatus').textContent = 'Username and password required'; return; }
      el('uStatus').textContent = 'Creating…';
      try { await api.send('/api/users', 'POST', body); closeModal(); render(); }
      catch (e) { el('uStatus').textContent = e.message; }
    }
    async function delUser(id, name) {
      if (!confirm(`Delete user "${name}"? Their project assignments are removed too.`)) return;
      try { await api.send(`/api/users/${id}`, 'DELETE'); render(); } catch (e) { alert(e.message); }
    }
    async function manageAccess(id) {
      const u = users.find(x => x.id === id);
      let acc = {};
      try { acc = await api.get(`/api/users/${id}/access`); } catch {}
      const rows = projects.length ? projects.map(p => {
        const lvl = acc[p.id] || 'none';
        const opt = (v, t) => `<option value="${v}" ${lvl === v ? 'selected' : ''}>${t}</option>`;
        return `<div class="acc-row"><span>${esc([p.year, p.make, p.model].filter(Boolean).join(' ') || p.label || ('Project ' + p.id))}</span>
          <select onchange="setAccess(${id}, ${p.id}, this.value)">${opt('none', 'No access')}${opt('read', 'Read-only')}${opt('write', 'Read / write')}</select></div>`;
      }).join('') : '<p class="muted">No projects yet.</p>';
      modal(`<div class="m-head">${svg('team')} ${esc(u.username)} · project access</div>
        <div class="m-body"><div class="acc-list">${rows}</div></div>
        <div class="m-foot"><span class="m-status" id="aStatus"></span><button class="primary" onclick="closeModal();render()">Done</button></div>`);
    }
    async function setAccess(uid, vid, level) {
      el('aStatus').textContent = 'Saving…';
      try { await api.send(`/api/users/${uid}/access`, 'PUT', { vehicle_id: vid, level }); el('aStatus').textContent = 'Saved'; }
      catch (e) { el('aStatus').textContent = e.message; }
    }

    // ---- Organization: drag-and-drop team bubbles with soft physics ----
    const ORG_PALETTE = ['#0f9d6b', '#0e8aa6', '#8b5cf6', '#b7791f', '#db2777', '#0891b2', '#65a30d', '#d4493f'];
    const initialsOf = s => (s || '?').trim().split(/[\s._-]+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const SVGNS = 'http://www.w3.org/2000/svg';
    const mk = (tag, attrs) => { const e = document.createElementNS(SVGNS, tag); for (const k in attrs) e.setAttribute(k, attrs[k]); return e; };

    const Org = {
      raf: 0, bubbles: [], tokens: [], svg: null, gB: null, gT: null, W: 0, H: 0, drag: null, saveT: {},
      stop() { if (this.raf) cancelAnimationFrame(this.raf); this.raf = 0; this.bubbles = []; this.tokens = []; this.drag = null; },

      async start() {
        let orgs = [], users = [];
        try { [orgs, users] = await Promise.all([api.get('/api/orgs'), api.get('/api/users')]); }
        catch (e) { el('orgStage').innerHTML = `<p class="warn" style="padding:16px">${esc(e.message)}</p>`; return; }
        const stage = el('orgStage'); const rect = stage.getBoundingClientRect();
        this.W = rect.width; this.H = rect.height;
        this.svg = mk('svg', { id: 'orgSvg', width: this.W, height: this.H }); this.svg.setAttribute('class', 'org-svg');
        this.gB = mk('g', {}); this.gT = mk('g', {}); this.svg.append(this.gB, this.gT);
        stage.innerHTML = ''; stage.appendChild(this.svg);
        stage.appendChild(Object.assign(document.createElement('div'),
          { className: 'org-hint', innerHTML: 'Drag a person into a team to add them · drag them out to free them · drag a bubble to move it · double-click to rename' }));

        const orgOf = {};
        this.bubbles = orgs.map((o, i) => {
          const b = { id: o.id, name: o.name, color: o.color || ORG_PALETTE[i % ORG_PALETTE.length], count: 0,
            x: o.x != null ? o.x : 160 + Math.random() * (this.W - 320), y: o.y != null ? o.y : 120 + Math.random() * (this.H - 240),
            vx: 0, vy: 0, r: 60, wob: 0, wobV: 0, hover: 0 };
          o.members.forEach(uid => orgOf[uid] = o.id); return b;
        });
        this.tokens = users.map(u => {
          const oid = orgOf[u.id] || null; const home = this.bubbles.find(b => b.id === oid);
          return { uid: u.id, name: u.username, initials: initialsOf(u.username), orgId: oid,
            x: home ? home.x + (Math.random() - .5) * 50 : 60 + Math.random() * (this.W - 120),
            y: home ? home.y + (Math.random() - .5) * 50 : this.H - 60 - Math.random() * 50,
            vx: 0, vy: 0, drag: false };
        });
        this.buildEls(); this.recount();
        this.svg.addEventListener('pointerdown', e => this.onDown(e));
        window.addEventListener('pointermove', this._mv = e => this.onMove(e));
        window.addEventListener('pointerup', this._up = e => this.onUp(e));
        const loop = () => { this.step(); this.draw(); this.raf = requestAnimationFrame(loop); };
        this.raf = requestAnimationFrame(loop);
      },

      buildEls() {
        for (const b of this.bubbles) {
          b.circle = mk('circle', { class: 'org-bubble', fill: b.color, 'fill-opacity': .12, stroke: b.color, 'stroke-width': 2 });
          b.label = mk('text', { class: 'org-blabel', 'text-anchor': 'middle', fill: b.color }); b.label.textContent = b.name;
          b.cnt = mk('text', { class: 'org-bcount', 'text-anchor': 'middle', fill: b.color });
          b.del = mk('text', { class: 'org-bdel', 'text-anchor': 'middle', fill: b.color }); b.del.textContent = '×';
          b.del.dataset.del = b.id;
          this.gB.append(b.circle, b.label, b.cnt, b.del);
        }
        for (const t of this.tokens) {
          t.g = mk('g', { class: 'org-token' }); t.g.dataset.uid = t.uid;
          t.dot = mk('circle', { r: 17, class: 'org-dot' });
          t.txt = mk('text', { class: 'org-tinit', 'text-anchor': 'middle', dy: '.35em' }); t.txt.textContent = t.initials;
          t.nm = mk('text', { class: 'org-tname', 'text-anchor': 'middle', y: 30 }); t.nm.textContent = t.name;
          const tip = mk('title', {}); tip.textContent = t.name; t.g.append(t.dot, t.txt, t.nm, tip);
          this.colorToken(t); this.gT.appendChild(t.g);
        }
      },
      colorToken(t) {
        const b = t.orgId ? this.bubbles.find(x => x.id === t.orgId) : null; const c = b ? b.color : '#94a3b8';
        t.dot.setAttribute('fill', c); t.dot.setAttribute('fill-opacity', b ? .9 : .5);
        t.dot.setAttribute('stroke', c); t.g.classList.toggle('free', !b);
        if (t.nm) t.nm.style.display = b ? 'none' : '';  // names only on free agents; rest use initials + tooltip
      },
      recount() {
        for (const b of this.bubbles) { b.count = this.tokens.filter(t => t.orgId === b.id).length;
          b.rTarget = 46 + 15 * Math.sqrt(b.count); }
      },
      bubbleAt(x, y) {  // topmost bubble whose disc contains (x,y)
        for (let i = this.bubbles.length - 1; i >= 0; i--) { const b = this.bubbles[i];
          if (Math.hypot(x - b.x, y - b.y) < b.r) return b; } return null;
      },

      onDown(e) {
        const p = this.pt(e);
        if (e.target.dataset && e.target.dataset.del) { this.removeTeam(+e.target.dataset.del); return; }
        const g = e.target.closest && e.target.closest('.org-token');
        if (g) { const t = this.tokens.find(x => x.uid === +g.dataset.uid);
          this.drag = { kind: 'token', t }; t.drag = true; t.g.classList.add('dragging'); this.gT.appendChild(t.g); return; }
        const b = this.bubbleAt(p.x, p.y);
        if (b) { this.drag = { kind: 'bubble', b, dx: p.x - b.x, dy: p.y - b.y }; b.dragging = true; }
      },
      onMove(e) {
        if (!this.drag) return; const p = this.pt(e);
        if (this.drag.kind === 'token') { const t = this.drag.t; t.x = p.x; t.y = p.y; t.vx = t.vy = 0;
          const over = this.bubbleAt(p.x, p.y); for (const b of this.bubbles) b.hover = (b === over) ? 1 : 0; }
        else { const b = this.drag.b; b.x = p.x - this.drag.dx; b.y = p.y - this.drag.dy; b.vx = b.vy = 0; }
      },
      onUp() {
        if (!this.drag) return; const d = this.drag; this.drag = null;
        if (d.kind === 'token') { const t = d.t; t.drag = false; t.g.classList.remove('dragging');
          const over = this.bubbleAt(t.x, t.y); const newId = over ? over.id : null;
          for (const b of this.bubbles) b.hover = 0;
          if (newId !== t.orgId) { t.orgId = newId; this.colorToken(t); this.recount();
            if (over) { over.wobV += 7; } this.persistAssign(t.uid, newId); }
        } else { d.b.dragging = false; this.saveOrg(d.b); }
      },
      pt(e) { const r = this.svg.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; },

      step() {
        const B = this.bubbles, T = this.tokens, cx = this.W / 2, cy = this.H / 2;
        for (const b of B) {
          b.r += (b.rTarget + (b.hover ? 6 : 0) - b.r) * 0.14;
          b.wobV += -b.wob * 0.18; b.wobV *= 0.86; b.wob += b.wobV;  // squish spring
          if (!b.dragging) {
            b.vx += (cx - b.x) * 0.0006; b.vy += (cy - b.y) * 0.0006;
            for (const o of B) { if (o === b) continue; const dx = b.x - o.x, dy = b.y - o.y;
              const d = Math.hypot(dx, dy) || 1, min = b.r + o.r + 14;
              if (d < min) { const f = (min - d) / d * 0.5; b.vx += dx * f * 0.02; b.vy += dy * f * 0.02; } }
            b.vx *= 0.9; b.vy *= 0.9; b.x += b.vx; b.y += b.vy;
            b.x = Math.max(b.r, Math.min(this.W - b.r, b.x)); b.y = Math.max(b.r, Math.min(this.H - b.r, b.y));
          }
        }
        for (const t of T) {
          if (t.drag) continue; const home = t.orgId ? B.find(x => x.id === t.orgId) : null;
          if (home) { const dx = home.x - t.x, dy = home.y - t.y, d = Math.hypot(dx, dy) || 1;
            const inner = home.r - 22; const k = d > inner ? 0.05 : 0.008;  // weak pull inside; repulsion spreads them
            t.vx += dx * k; t.vy += dy * k;
          } else { t.vy += (this.H - 46 - t.y) * 0.003; t.vx += (this.W / 2 - t.x) * 0.0005;
            const b = this.bubbleAt(t.x, t.y); if (b) { const dx = t.x - b.x, dy = t.y - b.y, d = Math.hypot(dx, dy) || 1;
              t.vx += dx / d * 0.6; t.vy += dy / d * 0.6; } }
          for (const o of T) { if (o === t) continue; const dx = t.x - o.x, dy = t.y - o.y; const d = Math.hypot(dx, dy) || 1;
            if (d < 44) { const f = (44 - d) / d * 0.5; t.vx += dx * f * 0.13; t.vy += dy * f * 0.13; } }
          t.vx *= 0.86; t.vy *= 0.86; t.x += t.vx; t.y += t.vy;
          t.x = Math.max(18, Math.min(this.W - 18, t.x)); t.y = Math.max(18, Math.min(this.H - 18, t.y));
        }
      },
      draw() {
        for (const b of this.bubbles) { const r = Math.max(20, b.r + b.wob);
          b.circle.setAttribute('cx', b.x); b.circle.setAttribute('cy', b.y); b.circle.setAttribute('r', r);
          b.circle.setAttribute('fill-opacity', b.hover ? .2 : .12);
          b.label.setAttribute('x', b.x); b.label.setAttribute('y', b.y - 4); b.label.textContent = b.name;
          b.cnt.setAttribute('x', b.x); b.cnt.setAttribute('y', b.y + 16); b.cnt.textContent = b.count + (b.count === 1 ? ' member' : ' members');
          b.del.setAttribute('x', b.x + r - 12); b.del.setAttribute('y', b.y - r + 18);
        }
        for (const t of this.tokens) t.g.setAttribute('transform', `translate(${t.x.toFixed(1)},${t.y.toFixed(1)})`);
      },

      persistAssign(uid, orgId) { api.send('/api/orgs/assign', 'POST', { user_id: uid, org_id: orgId }).catch(() => {}); },
      saveOrg(b) { clearTimeout(this.saveT[b.id]);
        this.saveT[b.id] = setTimeout(() => api.send('/api/orgs/' + b.id, 'PUT', { x: Math.round(b.x), y: Math.round(b.y) }).catch(() => {}), 350); },
      async addTeam(name) { const i = this.bubbles.length;
        const o = await api.send('/api/orgs', 'POST', { name, color: ORG_PALETTE[i % ORG_PALETTE.length],
          x: Math.round(this.W / 2 + (Math.random() - .5) * 120), y: Math.round(this.H / 2 + (Math.random() - .5) * 120) });
        this.stopKeep(); this.start();  // simplest: reload the stage with the new bubble
      },
      stopKeep() { if (this.raf) cancelAnimationFrame(this.raf); this.raf = 0;
        window.removeEventListener('pointermove', this._mv); window.removeEventListener('pointerup', this._up); },
      async rename(b) { const name = prompt('Rename team', b.name); if (name && name.trim()) { b.name = name.trim();
        await api.send('/api/orgs/' + b.id, 'PUT', { name: b.name }).catch(() => {}); } },
      async removeTeam(id) { const b = this.bubbles.find(x => x.id === id); if (!b) return;
        if (!confirm(`Delete team "${b.name}"? Members become unassigned.`)) return;
        await api.send('/api/orgs/' + id, 'DELETE').catch(() => {}); this.stopKeep(); this.start(); },
    };

    async function renderOrg(m) {
      m.innerHTML = `<div class="adm-head"><h1>Organization</h1><button class="primary" onclick="newTeam()">+ New team</button></div>
        <p class="muted" style="max-width:720px">Teams are living bubbles. <b>Drag a person into a bubble</b> to add them to that team, drag them back out to free them — the bubble grows and wobbles as people join. Drag a bubble to reposition it; double-click to rename.</p>
        <div class="org-stage" id="orgStage"></div>`;
      Org.start();
      // double-click to rename a bubble
      el('orgStage').addEventListener('dblclick', e => { const b = Org.bubbleAt(...Object.values(Org.pt(e))); if (b) Org.rename(b); });
    }
    async function newTeam() { const name = prompt('Name the new team', 'New team'); if (name && name.trim()) Org.addTeam(name.trim()); }

    document.documentElement.dataset.theme = localStorage.getItem('canopy-theme') || 'light';
    renderNav(); render();
    window.go = go; window.openForm = openForm; window.applyPreset = applyPreset; window.authFields = authFields;
    window.saveInt = saveInt; window.testInt = testInt; window.delInt = delInt; window.closeModal = closeModal;
    window.openUser = openUser; window.saveUser = saveUser; window.delUser = delUser;
    window.manageAccess = manageAccess; window.setAccess = setAccess; window.render = render;
    window.newTeam = newTeam;
  </script>
</body>
</html>
