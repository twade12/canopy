<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CANOPY · Vision</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <button class="iconbtn" id="sidebarToggle" title="Toggle sidebar" onclick="ui.toggleSidebar()"></button>
    <div class="brand">
      <svg class="mark" viewBox="0 0 64 64" aria-hidden="true">
        <path d="M40 8 L57 16 L46 27 Z" fill="#f3b95f" stroke="#d99b45" stroke-width="1.5"/>
        <path d="M52 13 L46 27" stroke="#c77b36" stroke-width="4" stroke-linecap="round"/>
        <rect x="14" y="26" width="28" height="28" fill="#2e8b6f"/>
        <rect x="14" y="36" width="28" height="13" fill="#0e3a2b"/>
        <ellipse cx="28" cy="26" rx="14" ry="4.5" fill="#6fe0b4"/>
        <ellipse cx="28" cy="26" rx="11" ry="3" fill="#0d2c20"/>
      </svg>
      <span class="name">CANOPY</span><span class="pun">Can&nbsp;’o&nbsp;Pie</span>
    </div>
    <div class="spacer"></div>
    <button class="iconbtn" id="splitToggle" title="Split / unsplit right panel" onclick="ui.toggleSplit()"></button>
    <button class="iconbtn" id="diagToggle" title="Show/hide diagram panel" onclick="ui.toggleDiagram()"></button>
    <button class="iconbtn" id="themeToggle" title="Toggle theme" onclick="ui.toggleTheme()"></button>
    <div class="status-pill"><span id="statusDot" class="dot"></span><span id="statusText">…</span></div>
  </header>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="head"><h2>Modules / Vehicles</h2>
        <button class="iconbtn" title="New record" onclick="ui.newRecord()" id="newRecBtn"></button>
      </div>
      <div class="list" id="recordList"></div>
    </aside>

    <div class="workspace" id="workspace">
      <div class="slot" id="slot-left"></div>
      <div class="col-right">
        <div class="slot" id="slot-rightTop"></div>
        <div class="slot hidden" id="slot-rightBottom"></div>
      </div>
    </div>
  </div>

  <input id="fileInput" type="file" accept="image/*,application/pdf" class="hidden">
  <div id="tooltip"></div>
  <script src="/static/app.js"></script>
</body>
</html>
