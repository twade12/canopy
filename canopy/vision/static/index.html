<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"><title>CANOPY · Vision</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <button class="iconbtn" id="sidebarToggle" title="Toggle sidebar" onclick="ui.toggleSidebar()"></button>
    <span class="wordmark">CANOPY</span>
    <button class="iconbtn" id="cockpitBtn" title="NPI Cockpit" onclick="ui.openView('cockpit')"></button>
    <div class="spacer"></div>
    <button class="iconbtn" id="assistantBtn" title="Assistant (all projects)" onclick="ui.openView('assistant')"></button>
    <button class="iconbtn" id="researchBtn" title="Deep research" onclick="ui.openView('research')"></button>
    <button class="iconbtn" id="knowledgeBtn" title="Knowledge base" onclick="ui.openView('knowledge')"></button>
    <button class="iconbtn" id="productsBtn" title="Product library" onclick="ui.openView('products')"></button>
    <span class="topbar-div"></span>
    <button class="iconbtn" id="dmmBtn" title="Multimeter" onclick="ui.openView('dmm')"></button>
    <button class="iconbtn" id="scopeBtn" title="Oscilloscope" onclick="ui.openView('scope')"></button>
    <button class="iconbtn" id="siggenBtn" title="Signal generator" onclick="ui.openView('siggen')"></button>
    <button class="iconbtn" id="benchBtn" title="CAN bench" onclick="ui.openView('bench')"></button>
    <button class="iconbtn" id="apiBtn" title="API documentation" onclick="ui.openView('api')"></button>
    <button class="iconbtn" id="resetBtn" title="Reset layout" onclick="ui.resetLayout()"></button>
    <button class="iconbtn" id="themeToggle" title="Toggle theme" onclick="ui.toggleTheme()"></button>
    <button class="iconbtn hidden" id="logoutBtn" title="Sign out" onclick="ui.logout()"></button>
    <div class="status-pill"><span id="statusDot" class="dot"></span><span id="statusText">…</span></div>
  </header>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="head"><h2>Projects</h2>
        <button class="iconbtn" title="New project" onclick="ui.newRecord()" id="newRecBtn"></button>
      </div>
      <div class="sb-controls">
        <div class="sb-search"><span id="searchIcon"></span><input id="projSearch" placeholder="Search title or tag…" oninput="ui.renderRecords()"></div>
        <div class="row" style="gap:6px">
          <select id="projSort" onchange="ui.renderRecords()"><option value="recent">Recent</option><option value="title">Title A–Z</option></select>
          <select id="projGroup" onchange="ui.renderRecords()"><option value="none">No grouping</option><option value="make">By make</option><option value="year">By year</option></select>
        </div>
      </div>
      <div class="list" id="recordList"></div>
    </aside>

    <div class="workspace" id="workspace"></div>
  </div>

  <input id="fileInput" type="file" accept="image/*,application/pdf" class="hidden">
  <div id="tooltip"></div>
  <div id="aiToast" class="hidden"></div>
  <script src="/static/app.js"></script>
</body>
</html>
