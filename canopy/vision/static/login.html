<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CANOPY · Sign in</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
      background: linear-gradient(-45deg, #073b22, #0f9d6b, #0e8aa6, #0c2a1e, #2e8b6f, #0a6b4a);
      background-size: 400% 400%; animation: canopyGrad 22s ease infinite; }
    @keyframes canopyGrad { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    /* soft drifting light blobs for depth */
    body::before, body::after { content: ""; position: absolute; border-radius: 50%; filter: blur(70px); opacity: .5; pointer-events: none; }
    body::before { width: 520px; height: 520px; background: #34d399; top: -160px; left: -120px; animation: float1 16s ease-in-out infinite; }
    body::after { width: 460px; height: 460px; background: #22d3ee; bottom: -180px; right: -120px; animation: float2 19s ease-in-out infinite; }
    @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(60px,40px); } }
    @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-50px,-40px); } }
    .login-card { position: relative; z-index: 1; width: min(360px, 92vw);
      background: rgba(255,255,255,0.92); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.5); border-radius: 16px;
      box-shadow: 0 20px 60px rgba(4,30,18,0.35); padding: 28px 26px; }
    [data-theme="dark"] .login-card { background: rgba(14,27,20,0.86); border-color: rgba(52,211,153,0.25); }
    .login-card .brand { font-weight: 800; letter-spacing: 1px; font-size: 24px; margin-bottom: 4px; }
    .login-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
    .login-card input { margin-bottom: 12px; }
    .login-card .err { color: var(--danger); font-size: 13px; min-height: 18px; }
    @media (prefers-reduced-motion: reduce) { body, body::before, body::after { animation: none; } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">CANOPY</div>
    <div class="sub">Universal CAN module test &amp; diagnostic station</div>
    <input id="pw" type="password" placeholder="Password" autofocus
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="primary" style="width:100%" onclick="doLogin()">Sign in</button>
    <div class="err" id="err"></div>
  </div>
  <script>
    async function doLogin() {
      const pw = document.getElementById('pw').value;
      const r = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, secure: location.protocol === 'https:' }) });
      if (r.ok) location.href = '/';
      else document.getElementById('err').textContent = 'Incorrect password';
    }
  </script>
</body>
</html>
