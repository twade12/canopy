<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=2"><title>CANOPY · Sign in</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
      background: linear-gradient(-45deg, #052b18, #0f9d6b, #0e8aa6, #073b22, #2e8b6f, #0a6b4a);
      background-size: 400% 400%; animation: canopyGrad 24s ease infinite; }
    @keyframes canopyGrad { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    /* soft drifting light blobs for depth */
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .5; pointer-events: none; z-index: 0; }
    .blob.a { width: 540px; height: 540px; background: #34d399; top: -170px; left: -130px; animation: float1 17s ease-in-out infinite; }
    .blob.b { width: 480px; height: 480px; background: #22d3ee; bottom: -190px; right: -130px; animation: float2 20s ease-in-out infinite; }
    .blob.c { width: 360px; height: 360px; background: #0f9d6b; top: 40%; left: 50%; animation: float1 23s ease-in-out infinite; opacity: .35; }
    @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(60px,40px); } }
    @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-50px,-40px); } }

    /* falling canopy leaves */
    .leaves { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .lf { position: absolute; top: -14%; animation: fall var(--d, 12s) linear infinite; will-change: transform; }
    @keyframes fall { to { transform: translateY(120vh); } }
    .lf svg { display: block; color: var(--c, #34d399); opacity: .4;
      animation: sway var(--s, 3.5s) ease-in-out infinite alternate; transform-origin: center;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.12)); }
    @keyframes sway { from { transform: translateX(-16px) rotate(-30deg); } to { transform: translateX(16px) rotate(30deg); } }

    .wrap { position: relative; z-index: 2; display: flex; align-items: center; gap: 54px; width: min(980px, 94vw); }

    /* left: streaming feature hero */
    .hero { flex: 1; color: #eafff4; animation: cardIn .7s cubic-bezier(.2,.9,.25,1) both; }
    .hero-kicker { display: inline-flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: #c8f7e4; opacity: .9; margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,.25); padding: 5px 12px; border-radius: 999px; background: rgba(255,255,255,.08); }
    .hero-kicker svg { width: 15px; height: 15px; }
    .hero h1 { font-size: 34px; line-height: 1.15; margin: 0 0 18px; font-weight: 800; letter-spacing: -.5px; }
    .hero h1 .grad { background: linear-gradient(90deg, #eafff4, #8ff0cf 60%, #67e8f9);
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    .hero-stream { font-size: 17px; line-height: 1.5; min-height: 78px; color: #e9fff6; margin: 0 0 18px; }
    .hero-name { font-weight: 800; color: #6ee7b7; }
    .caret { display: inline-block; width: 2px; height: 1.05em; background: #6ee7b7; margin-left: 2px;
      vertical-align: -2px; animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .hero-chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .hero-chips span { font-size: 11.5px; font-weight: 600; color: #eafff4; background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22); padding: 4px 10px; border-radius: 999px; }

    /* right: login card */
    .login-card { position: relative; z-index: 2; order: -1; width: 358px; flex: none; text-align: center;
      background: rgba(255,255,255,0.94); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.55); border-radius: 18px;
      box-shadow: 0 24px 70px rgba(4,30,18,0.42); padding: 30px 28px;
      animation: cardIn .7s cubic-bezier(.2,.9,.25,1) .08s both; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(16px) scale(.97); } to { opacity: 1; transform: none; } }
    [data-theme="dark"] .login-card { background: rgba(14,27,20,0.9); border-color: rgba(52,211,153,0.28); }

    .badge { width: 62px; height: 62px; margin: 0 auto 14px; border-radius: 16px;
      background: linear-gradient(150deg, #12b27a, #0c7d53); display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 26px rgba(15,157,107,.45); animation: badgeFloat 4.5s ease-in-out infinite; }
    @keyframes badgeFloat { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-6px) rotate(2deg); } }
    .badge svg { width: 38px; height: 38px; }
    .badge .vein { animation: veinDraw 2.2s ease-in-out .4s both; }
    @keyframes veinDraw { from { stroke-dashoffset: 40; } to { stroke-dashoffset: 0; } }

    .login-card .brand { font-weight: 800; letter-spacing: 2px; font-size: 26px; margin-bottom: 3px; color: var(--text); }
    .login-card .sub { color: var(--muted); font-size: 12.5px; margin-bottom: 20px; }
    .login-card input { margin-bottom: 12px; text-align: left; }
    .login-card .err { color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 2px; }
    .foot { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 14px; color: var(--muted); font-size: 11.5px; }
    .foot svg { width: 14px; height: 14px; color: var(--accent); animation: sway 3s ease-in-out infinite alternate; transform-origin: 60% 90%; }

    @media (max-width: 860px) {
      .hero { display: none; }
      .wrap { width: auto; }
    }
    @media (prefers-reduced-motion: reduce) {
      body, .blob, .lf, .lf svg, .badge, .login-card, .hero, .badge .vein, .foot svg, .caret { animation: none !important; }
      .lf { display: none; }
    }
  </style>
</head>
<body>
  <div class="blob a"></div><div class="blob b"></div><div class="blob c"></div>
  <div class="leaves" id="leaves"></div>

  <div class="wrap">
    <div class="hero">
      <div class="hero-kicker">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 19C5 10 11 4 20 4c0 9-6 15-15 15z"/><path d="M5 19C9 15 13 12 18 10"/></svg>
        The Canopy platform
      </div>
      <h1>From a bare module to a <span class="grad">documented repair</span>.</h1>
      <p class="hero-stream"><span class="hero-name">Sage</span> <span id="streamText"></span><span class="caret"></span></p>
      <div class="hero-chips"><span>Vision</span><span>Restbus + UDS</span><span>Instruments</span><span>Product library</span><span>Wiki</span><span>Admin &amp; teams</span></div>
    </div>

    <div class="login-card">
      <div class="badge">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path d="M7 25C7 14 14 7 25 7c0 11-7 18-18 18z" fill="#ffffff"/>
          <path class="vein" d="M22.5 9.5C15 12.5 11 17 8 24" fill="none" stroke="#0c7d53" stroke-width="1.8"
                stroke-linecap="round" stroke-dasharray="40"/>
        </svg>
      </div>
      <div class="brand">CANOPY</div>
      <div class="sub">Universal CAN module test &amp; diagnostic station</div>
      <input id="user" type="text" placeholder="Username" autofocus autocomplete="username"
             onkeydown="if(event.key==='Enter')document.getElementById('pw').focus()">
      <input id="pw" type="password" placeholder="Password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
      <button class="primary" style="width:100%" onclick="doLogin()">Sign in</button>
      <div class="err" id="err"></div>
      <div class="foot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 19C5 10 11 4 20 4c0 9-6 15-15 15z"/><path d="M5 19C9 15 13 12 18 10"/></svg>
        <span>Local-first · powered by Sage</span>
      </div>
    </div>
  </div>

  <script>
    // sprinkle a few drifting canopy leaves
    (function () {
      const colors = ['#34d399', '#6ee7b7', '#22d3ee', '#0f9d6b'];
      const wrap = document.getElementById('leaves'), N = 12;
      for (let i = 0; i < N; i++) {
        const d = document.createElement('div'); d.className = 'lf';
        const size = 13 + Math.random() * 22;
        d.style.left = (Math.random() * 100) + '%';
        d.style.setProperty('--d', (9 + Math.random() * 11) + 's');
        d.style.animationDelay = (-Math.random() * 18) + 's';
        d.innerHTML = `<svg viewBox="0 0 24 24" width="${size}" height="${size}" style="--c:${colors[i % colors.length]};--s:${(2.4 + Math.random() * 2.6)}s"><path d="M4 20C4 11 10 4 20 4c0 10-7 16-16 16z" fill="currentColor"/></svg>`;
        wrap.appendChild(d);
      }
    })();

    // streaming feature ticker — Sage "types out" what the platform does
    (function () {
      const FEATURES = [
        'reads a wiring diagram and extracts the connector pinout.',
        'turns a board photo into identified, boxed components.',
        'simulates the whole vehicle bus so the module wakes up.',
        'triages faults to the component — “U3 5V LDO open”.',
        'drives the multimeter, scope & signal generator over USB.',
        'records every measurement into an auditable repair file.',
        'promotes a finished repair into a wiki page + product listing.',
        'gives one admin many techs, each with per-project access.',
      ];
      const out = document.getElementById('streamText');
      const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
      let fi = 0;
      if (reduce) {  // no typing — just rotate full lines
        out.textContent = FEATURES[0];
        setInterval(() => { fi = (fi + 1) % FEATURES.length; out.textContent = FEATURES[fi]; }, 3500);
        return;
      }
      let ci = 0, dir = 1;
      (function tick() {
        const txt = FEATURES[fi];
        ci += dir;
        out.textContent = txt.slice(0, ci);
        let delay = dir > 0 ? 30 : 14;
        if (dir > 0 && ci >= txt.length) { dir = -1; delay = 1900; }
        else if (dir < 0 && ci <= 0) { dir = 1; fi = (fi + 1) % FEATURES.length; delay = 360; }
        setTimeout(tick, delay);
      })();
    })();

    async function doLogin() {
      const username = document.getElementById('user').value;
      const pw = document.getElementById('pw').value;
      const r = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password: pw, secure: location.protocol === 'https:' }) });
      if (r.ok) location.href = '/';
      else document.getElementById('err').textContent = 'Invalid username or password';
    }
  </script>
</body>
</html>
