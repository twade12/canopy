<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=2"><title>CANOPY · Capture</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { padding: 16px; display: block; }
    .mhead { font-weight: 800; letter-spacing: 1px; font-size: 20px; }
    .msub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    .bigbtn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;
      padding: 18px; font-size: 17px; border-radius: 14px; margin-bottom: 12px; }
    .gallery { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 14px; }
    .gallery img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }
    .sent { color: var(--accent); font-size: 13px; min-height: 18px; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="mhead">CANOPY</div>
  <div class="msub" id="proj">connecting…</div>
  <input id="cam" type="file" accept="image/*" capture="environment" class="hidden" multiple>
  <button class="primary bigbtn" onclick="document.getElementById('cam').click()">Take / choose photo</button>
  <div class="sent" id="sent"></div>
  <div class="gallery" id="gal"></div>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    async function init() {
      try { const r = await fetch('/api/pair/info?token=' + encodeURIComponent(token));
        if (!r.ok) throw 0; const d = await r.json();
        document.getElementById('proj').textContent = 'Sending photos to: ' + d.label;
      } catch { document.getElementById('proj').innerHTML = '<span style="color:#d4493f">Pairing link invalid or expired. Re-scan the QR on your computer.</span>'; }
    }
    // Resize on the phone before upload — a raw camera photo is several MB; a 1600px JPEG is
    // ~150-300 KB, so it lands on the desktop almost instantly over Wi-Fi / VPN.
    function shrink(file) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const max = 1600, sc = Math.min(1, max / Math.max(img.width, img.height));
          const w = Math.round(img.width * sc), h = Math.round(img.height * sc);
          const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
          cv.getContext('2d').drawImage(img, 0, 0, w, h);
          cv.toBlob(b => resolve(b || file), 'image/jpeg', 0.85);
        };
        img.onerror = () => resolve(file);
        img.src = URL.createObjectURL(file);
      });
    }
    document.getElementById('cam').onchange = async e => {
      const files = [...e.target.files]; e.target.value = '';
      const sent = document.getElementById('sent');
      for (let i = 0; i < files.length; i++) {
        sent.textContent = files.length > 1 ? `uploading ${i + 1}/${files.length}…` : 'uploading…';
        let blob; try { blob = await shrink(files[i]); } catch { blob = files[i]; }
        const fd = new FormData(); fd.append('token', token); fd.append('file', blob, 'photo.jpg');
        try { const r = await fetch('/api/pair/upload', { method: 'POST', body: fd });
          if (!r.ok) throw 0;
          document.getElementById('gal').insertAdjacentHTML('afterbegin', '<img src="' + URL.createObjectURL(blob) + '">');
          sent.innerHTML = '<span style="color:var(--accent)">✓ sent to CANOPY — it appears on your computer in a moment</span>';
        } catch { sent.innerHTML = '<span style="color:#d4493f">upload failed — check the connection and re-scan</span>'; }
      }
    };
    init();
  </script>
</body>
</html>
